name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    container:
      image: reactnativecommunity/react-native-android:v15.0
      volumes:
        - /usr:/host/usr
    steps:
    - name: Free disk space
      run: |
        df -h /
        rm -rf /host/usr/local/lib/android
        rm -rf /host/usr/local/.ghcup
        rm -rf /host/usr/share/dotnet
        rm -rf /host/usr/share/swift
        df -h /

    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm install

    - name: Decode keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release.keystore

    - name: Build release APK
      working-directory: ./android
      # 这里增加了超时限制参数，解决 JitPack Read timed out 问题
      run: |
        ./gradlew :app:assembleRelease \
          -Dorg.gradle.internal.http.socketTimeout=300000 \
          -Dorg.gradle.internal.http.connectionTimeout=300000 \
          -Dorg.gradle.http.retries=3 \
          -Pandroid.injected.signing.store.file=$PWD/app/my-release.keystore \
          -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_STORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: jitsi-meet-release-apk
        # 确保路径匹配你的项目结构，如果报错找不到文件，请检查此路径
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30