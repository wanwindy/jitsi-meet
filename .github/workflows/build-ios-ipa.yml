name: Build iOS IPA (Signed)

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

      # App identifiers
      MAIN_BUNDLE_ID: "com.fangxinban.meet"
      BROADCAST_BUNDLE_ID: "com.fangxinban.meet.broad"
      APP_GROUP_ID: "group.com.fangxinban.meet"

      # Provisioning profile names in Apple Developer
      MAIN_PROFILE_NAME: "Fangxinban_Main_Store"
      BROADCAST_PROFILE_NAME: "Fangxinban_Broad_Store"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install JS deps
        run: npm install

      - name: Select Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -N
          pod --version

      - name: Install Pods
        working-directory: ios
        run: |
          set -o pipefail
          pod repo update 2>&1 | tee "$GITHUB_WORKSPACE/pod_repo_update.log"
          pod install 2>&1 | tee "$GITHUB_WORKSPACE/pod_install.log"

      - name: Auto-increment Build Number
        run: |
          set -euo pipefail
          BUILD_NUMBER="${{ github.run_number }}"
          echo "Setting Build Number to: $BUILD_NUMBER"

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/app/src/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/app/broadcast-extension/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/sdk/src/Info.plist

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Install signing certificate and provisioning profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BROADCAST_PROVISION_PROFILE_BASE64: ${{ secrets.BROADCAST_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          APP_PP_PATH="$RUNNER_TEMP/app.mobileprovision"
          BROADCAST_PP_PATH="$RUNNER_TEMP/broadcast.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$APP_PP_PATH"
          echo -n "$BROADCAST_PROVISION_PROFILE_BASE64" | base64 --decode -o "$BROADCAST_PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          APP_PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$APP_PP_PATH")")
          BROADCAST_PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$BROADCAST_PP_PATH")")

          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$APP_PP_PATH")")
          APP_PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$APP_PP_PATH")")
          BROADCAST_PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$BROADCAST_PP_PATH")")

          cp "$APP_PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$APP_PP_UUID.mobileprovision"
          cp "$BROADCAST_PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$BROADCAST_PP_UUID.mobileprovision"

          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
          echo "APP_PP_UUID=$APP_PP_UUID" >> "$GITHUB_ENV"
          echo "BROADCAST_PP_UUID=$BROADCAST_PP_UUID" >> "$GITHUB_ENV"
          echo "APP_PP_NAME=$APP_PP_NAME" >> "$GITHUB_ENV"
          echo "BROADCAST_PP_NAME=$BROADCAST_PP_NAME" >> "$GITHUB_ENV"

      - name: Verify provisioning profiles
        run: |
          set -euo pipefail

          echo "=== App profile ==="
          security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/$APP_PP_UUID.mobileprovision" > /tmp/app_profile.plist
          /usr/libexec/PlistBuddy -c "Print Name" /tmp/app_profile.plist
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/app_profile.plist
          /usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups" /tmp/app_profile.plist || true

          echo "=== Broadcast profile ==="
          security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/$BROADCAST_PP_UUID.mobileprovision" > /tmp/broadcast_profile.plist
          /usr/libexec/PlistBuddy -c "Print Name" /tmp/broadcast_profile.plist
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/broadcast_profile.plist
          /usr/libexec/PlistBuddy -c "Print Entitlements:com.apple.security.application-groups" /tmp/broadcast_profile.plist || true

      - name: Force entitlements to expected App Group
        run: |
          set -euo pipefail

          APP_ENT="ios/app/app.entitlements"
          EXT_ENT="ios/app/broadcast-extension/broadcast-extension.entitlements"

          /usr/libexec/PlistBuddy -c "Delete :com.apple.security.application-groups" "$APP_ENT" || true
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.application-groups array" "$APP_ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.application-groups:0 string $APP_GROUP_ID" "$APP_ENT"

          /usr/libexec/PlistBuddy -c "Delete :com.apple.security.application-groups" "$EXT_ENT" || true
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.application-groups array" "$EXT_ENT"
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.application-groups:0 string $APP_GROUP_ID" "$EXT_ENT"

          echo "=== app.entitlements ==="
          cat "$APP_ENT"
          echo "=== broadcast-extension.entitlements ==="
          cat "$EXT_ENT"

      - name: Force manual signing in project
        run: |
          set -euo pipefail
          PBXPROJ="ios/app/app.xcodeproj/project.pbxproj"

          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' "$PBXPROJ"

      - name: Show build settings
        run: |
          xcodebuild \
            -workspace ios/jitsi-meet.xcworkspace \
            -scheme JitsiMeet \
            -showBuildSettings | \
            grep -E 'PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE_SPECIFIER|PROVISIONING_PROFILE|CODE_SIGN_ENTITLEMENTS|DEVELOPMENT_TEAM' || true

      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${MAIN_BUNDLE_ID}</key>
              <string>${MAIN_PROFILE_NAME}</string>
              <key>${BROADCAST_BUNDLE_ID}</key>
              <string>${BROADCAST_PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          echo "===== ExportOptions.plist ====="
          cat ios/ExportOptions.plist

      - name: Archive iOS app
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/jitsi-meet.xcworkspace \
            -scheme JitsiMeet \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ios/build/JitsiMeet.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$MAIN_PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER="$MAIN_BUNDLE_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee "$GITHUB_WORKSPACE/archive.log"

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath ios/build/JitsiMeet.xcarchive \
            -exportPath ios/build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            2>&1 | tee "$GITHUB_WORKSPACE/export.log"

      - name: Dump logs
        if: always()
        run: |
          echo "===== archive errors ====="
          grep -iE 'error:|BUILD FAILED|ARCHIVE FAILED|requires a provisioning profile' "$GITHUB_WORKSPACE/archive.log" 2>/dev/null || true
          echo "===== export errors ====="
          grep -iE 'error:|EXPORT FAILED' "$GITHUB_WORKSPACE/export.log" 2>/dev/null || true

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fangxinban-ios-ipa-${{ env.BUILD_NUMBER }}
          path: ios/build/ipa/*.ipa

      - name: Upload to TestFlight
        if: success()
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          IPA_FILE=$(find ios/build/ipa -name "*.ipa" -type f | head -1)

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"