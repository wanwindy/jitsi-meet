name: Build iOS IPA (Signed)

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install JS deps
        run: npm install

      - name: Select Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -N
          pod --version

      - name: Install Pods
        working-directory: ios
        run: |
          set -o pipefail
          pod repo update 2>&1 | tee $GITHUB_WORKSPACE/pod_repo_update.log
          pod install 2>&1 | tee $GITHUB_WORKSPACE/pod_install.log

      # ---- Signing Setup ----
      - name: Install signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate and profile
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          # Extract provisioning profile UUID for later use
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning Profile UUID: $PP_UUID"

      # ---- Create ExportOptions.plist ----
      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$(security find-certificate -c "iPhone Distribution" -p $RUNNER_TEMP/app-signing.keychain-db | openssl x509 -noout -subject | grep -oE 'OU = [^/,]+' | head -1 | sed 's/OU = //')</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.fangxinban.app</key>
                  <string>${PP_UUID}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "=== ExportOptions.plist ==="
          cat ios/ExportOptions.plist

      # ---- Build & Archive ----
      - name: Archive iOS app
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/jitsi-meet.xcworkspace \
            -scheme JitsiMeet \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ios/build/JitsiMeet.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            PRODUCT_BUNDLE_IDENTIFIER=com.fangxinban.app \
            2>&1 | tee $GITHUB_WORKSPACE/archive.log

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath ios/build/JitsiMeet.xcarchive \
            -exportPath ios/build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            2>&1 | tee $GITHUB_WORKSPACE/export.log

      - name: Dump logs (always)
        if: always()
        run: |
          echo "=== pod_install.log tail ==="
          tail -n 100 pod_install.log 2>/dev/null || true
          echo "=== archive.log tail ==="
          tail -n 300 archive.log 2>/dev/null || true
          echo "=== export.log tail ==="
          tail -n 200 export.log 2>/dev/null || true
          echo "=== IPA output ==="
          ls -la ios/build/ipa/ 2>/dev/null || echo "No IPA output found"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fangxinban-ios-ipa
          path: ios/build/ipa/*.ipa
          retention-days: 30

      # ---- Cleanup ----
      - name: Cleanup signing
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -f $RUNNER_TEMP/build_pp.mobileprovision
