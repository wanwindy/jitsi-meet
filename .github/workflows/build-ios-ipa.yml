name: Build iOS IPA (Signed)

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install JS deps
        run: npm install

      - name: Select Xcode
        run: |
          # Remove default Xcode symlink to avoid duplicate SwiftBridging module
          if [ -e /Applications/Xcode.app ]; then
            XCODE_162="$(readlink -f /Applications/Xcode_16.2.app 2>/dev/null || echo /Applications/Xcode_16.2.app)"
            XCODE_DEF="$(readlink -f /Applications/Xcode.app 2>/dev/null || echo /Applications/Xcode.app)"
            if [ "$XCODE_162" != "$XCODE_DEF" ]; then
              sudo mv /Applications/Xcode.app /Applications/Xcode_default.bak
              echo "Moved conflicting Xcode.app out of the way"
            fi
          fi
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version
          xcode-select -p

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -N
          pod --version

      - name: Install Pods
        working-directory: ios
        run: |
          set -o pipefail
          pod repo update 2>&1 | tee $GITHUB_WORKSPACE/pod_repo_update.log
          pod install 2>&1 | tee $GITHUB_WORKSPACE/pod_install.log

      # ---- Signing Setup ----
      - name: Install signing certificate and provisioning profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BROADCAST_PROVISION_PROFILE_BASE64: ${{ secrets.BROADCAST_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate and profiles
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          APP_PP_PATH=$RUNNER_TEMP/app.mobileprovision
          BROADCAST_PP_PATH=$RUNNER_TEMP/broadcast.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $APP_PP_PATH
          echo -n "$BROADCAST_PROVISION_PROFILE_BASE64" | base64 --decode -o $BROADCAST_PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $APP_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          cp $BROADCAST_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          # Extract UUIDs and Team ID
          APP_PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $APP_PP_PATH))
          BROADCAST_PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $BROADCAST_PP_PATH))
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin <<< $(/usr/bin/security cms -D -i $APP_PP_PATH))

          echo "APP_PP_UUID=$APP_PP_UUID" >> $GITHUB_ENV
          echo "BROADCAST_PP_UUID=$BROADCAST_PP_UUID" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

          echo "App Profile UUID: $APP_PP_UUID"
          echo "Broadcast Profile UUID: $BROADCAST_PP_UUID"
          echo "Team ID: $TEAM_ID"

      # ---- Create ExportOptions.plist ----
      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.fangxinban.app</key>
                  <string>${APP_PP_UUID}</string>
                  <key>com.fangxinban.app.broadcast</key>
                  <string>${BROADCAST_PP_UUID}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "=== ExportOptions.plist ==="
          cat ios/ExportOptions.plist

      # ---- Build & Archive ----
      - name: Archive iOS app
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/jitsi-meet.xcworkspace \
            -scheme JitsiMeet \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ios/build/JitsiMeet.xcarchive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            2>&1 | tee $GITHUB_WORKSPACE/archive.log

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath ios/build/JitsiMeet.xcarchive \
            -exportPath ios/build/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            2>&1 | tee $GITHUB_WORKSPACE/export.log

      - name: Dump logs (always)
        if: always()
        run: |
          echo "=== pod_install.log tail ==="
          tail -n 100 pod_install.log 2>/dev/null || true
          echo "=== archive.log errors ==="
          grep -iE 'error:|BUILD FAILED|ARCHIVE FAILED|fatal' archive.log 2>/dev/null | tail -n 50 || true
          echo "=== archive.log tail ==="
          tail -n 500 archive.log 2>/dev/null || true
          echo "=== export.log tail ==="
          tail -n 200 export.log 2>/dev/null || true
          echo "=== IPA output ==="
          ls -la ios/build/ipa/ 2>/dev/null || echo "No IPA output found"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fangxinban-ios-ipa
          path: ios/build/ipa/*.ipa
          retention-days: 30

      # ---- Cleanup ----
      - name: Cleanup signing
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -f $RUNNER_TEMP/app.mobileprovision
          rm -f $RUNNER_TEMP/broadcast.mobileprovision
