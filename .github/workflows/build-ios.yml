name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm install

    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        xcodebuild -version

    - name: Setup Ruby and CocoaPods
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true

    - name: Install Pods
      working-directory: ./ios
      run: bundle exec pod install --repo-update --deployment

    - name: Build iOS app (no signing)
      run: |
        xcodebuild build \
          -workspace ios/jitsi-meet.xcworkspace \
          -scheme JitsiMeet \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'generic/platform=iOS Simulator' \
          -derivedDataPath ios/build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Archive built app
      run: |
        cd ios/build/Build/Products/Debug-iphonesimulator
        zip -r $GITHUB_WORKSPACE/jitsi-meet-ios-simulator.zip *.app

    - name: Upload iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: jitsi-meet-ios-simulator
        path: jitsi-meet-ios-simulator.zip
        retention-days: 30
