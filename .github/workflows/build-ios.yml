name: Build iOS (Simulator)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 90
    env:
      NODE_OPTIONS: "--max-old-space-size=6144"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "yarn"

      - name: Install JS deps (Yarn)
        run: |
          corepack enable
          yarn --version
          yarn install --frozen-lockfile

      - name: Select Xcode (default on runner)
        run: |
          xcodebuild -version
          xcode-select -p

      # CocoaPods: for "compile success first", use the simplest approach
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods -N
          pod --version

      - name: Install Pods
        working-directory: ios
        run: |
          set -o pipefail
          pod repo update 2>&1 | tee $GITHUB_WORKSPACE/pod_repo_update.log
          pod install 2>&1 | tee $GITHUB_WORKSPACE/pod_install.log

      # Build simulator (no signing)
      - name: Build iOS Simulator (no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace ios/jitsi-meet.xcworkspace \
            -scheme JitsiMeet \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee $GITHUB_WORKSPACE/build.log

      - name: Dump logs (always)
        if: always()
        run: |
          echo "=== pod_install.log tail ==="
          tail -n 200 pod_install.log 2>/dev/null || true
          echo "=== build.log tail ==="
          tail -n 300 build.log 2>/dev/null || true
          echo "=== DerivedData Products ==="
          ls -la ios/build/Build/Products 2>/dev/null || true

      - name: Archive Simulator .app
        if: success()
        run: |
          APP_DIR="ios/build/Build/Products/Debug-iphonesimulator"
          echo "Looking for .app in: $APP_DIR"
          ls -la "$APP_DIR"
          cd "$APP_DIR"
          ls -la *.app
          zip -r "$GITHUB_WORKSPACE/jitsi-meet-ios-simulator.zip" *.app

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jitsi-meet-ios-simulator
          path: jitsi-meet-ios-simulator.zip
          retention-days: 30